recorder:
  ros__parameters:
    use_sim_time: false

    record:
      all: true
      all_topics: true
      exclude_topic_types: ["std_msgs/msg/String"]
      all_services: true
      is_discovery_disabled: false
      topic_polling_interval:
        sec: 0
        nsec: 10000000
      include_hidden_topics: true
      ignore_leaf_topics: false
      start_paused: false
      rmw_serialization_format: "cdr"
      qos_profile_overrides_path: ""

    storage:
      uri: "../rosbags/some_bag0"
      storage_id: "mcap"
      max_cache_size: 20000000

